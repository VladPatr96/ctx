<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CTX Offline</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: Inter, Segoe UI, sans-serif;
        background: #0e1116;
        color: #f5f7fa;
      }
      .card {
        border: 1px solid #253146;
        background: #111a2b;
        border-radius: 12px;
        padding: 20px 24px;
        max-width: 420px;
      }
      h1 {
        margin: 0 0 8px;
        font-size: 20px;
      }
      p {
        margin: 0;
        color: #9eb1ca;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>CTX is offline</h1>
      <p>The app shell is available, but network-backed data is temporarily unavailable.</p>
    </div>
  </body>
</html>
