<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Фон -->
  <rect width="512" height="512" rx="90" fill="#0F172A"/>
  
  <g transform="translate(0, -20)">
    <!-- T (Крыша) - Тонкая и четкая -->
    <g stroke="#F43F5E" stroke-width="16" stroke-linecap="butt" fill="none">
      <line x1="100" y1="160" x2="412" y2="160" />
      <line x1="256" y1="160" x2="256" y2="360" />
    </g>

    <!-- C (Зеленая скобка) - Прямоугольная, под левым крылом -->
    <path d="M200 240H135V360H200" stroke="#10B981" stroke-width="16" stroke-linecap="square" stroke-linejoin="miter" fill="none"/>

    <!-- X (Голубая) - Скругленная, под правым крылом -->
    <g stroke="#3B82F6" stroke-width="20" stroke-linecap="round">
      <line x1="312" y1="240" x2="400" y2="360" />
      <line x1="400" y1="240" x2="312" y2="360" />
    </g>
  </g>

  <!-- Текст: Исправлен разрыв -->
  <text x="256" y="450" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="500" text-anchor="middle" letter-spacing="5" text-transform="uppercase">
    <tspan fill="#10B981">C</tspan><tspan fill="#475569">OMPLEX </tspan><tspan fill="#F43F5E">T</tspan><tspan fill="#475569">ASK E</tspan><tspan fill="#3B82F6">X</tspan><tspan fill="#475569">ECUTION</tspan>
  </text>
</svg>
