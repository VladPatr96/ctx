<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Фон: Глубокий Slate -->
  <rect width="512" height="512" rx="110" fill="#0F172A"/>
  
  <g transform="translate(0, -15)">
    <!-- T - Стильная "Крыша" и Ось (Rose Red) -->
    <g stroke="#F43F5E" stroke-width="20" stroke-linecap="round" fill="none">
      <line x1="120" y1="160" x2="392" y2="160" />
      <line x1="256" y1="160" x2="256" y2="360" />
    </g>

    <!-- C - Минималистичная скобка (Emerald) -->
    <path d="M200 240H145V360H200" stroke="#10B981" stroke-width="18" stroke-linecap="square" stroke-linejoin="miter" fill="none"/>

    <!-- X - Изящный крест (Sky Blue) -->
    <g stroke="#3B82F6" stroke-width="22" stroke-linecap="round">
      <line x1="312" y1="240" x2="367" y2="360" />
      <line x1="367" y1="240" x2="312" y2="360" />
    </g>
  </g>

  <!-- Текст: Исправлен разрыв в слове eXecution -->
  <text x="256" y="445" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="600" text-anchor="middle" letter-spacing="4" text-transform="uppercase">
    <tspan fill="#10B981">C</tspan><tspan fill="#64748B">OMPLEX </tspan><tspan fill="#F43F5E">T</tspan><tspan fill="#64748B">ASK E</tspan><tspan fill="#3B82F6">X</tspan><tspan fill="#64748B">ECUTION</tspan>
  </text>
</svg>
