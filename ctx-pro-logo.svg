<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Фон: Глубокий полночный графит -->
  <rect width="512" height="512" rx="120" fill="#020617"/>
  
  <!-- Определение свечений для каждой буквы -->
  <defs>
    <filter id="glow-c" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glow-t" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glow-x" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <g transform="translate(256, 240)">
    
    <!-- C - Изящная неоновая скобка (Emerald) -->
    <path d="M-110 -70 H-150 V70 H-110" stroke="#10B981" stroke-width="28" fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow-c)"/>
    
    <!-- T - Центральный неоновый стержень (Rose) -->
    <g filter="url(#glow-t)">
      <line x1="-50" y1="-100" x2="50" y2="-100" stroke="#F43F5E" stroke-width="32" stroke-linecap="round" />
      <line x1="0" y1="-100" x2="0" y2="100" stroke="#F43F5E" stroke-width="32" stroke-linecap="round" />
    </g>
    
    <!-- X - Динамичный неоновый крест (Sky Blue) -->
    <g transform="translate(130, 0)" filter="url(#glow-x)">
      <line x1="-40" y1="-60" x2="40" y2="60" stroke="#3B82F6" stroke-width="28" stroke-linecap="round" />
      <line x1="40" y1="-60" x2="-40" y2="60" stroke="#3B82F6" stroke-width="28" stroke-linecap="round" />
    </g>

  </g>

  <!-- Текст: Современный моноширинный стиль -->
  <text x="256" y="450" font-family="ui-monospace, monospace" font-size="22" font-weight="900" text-anchor="middle" letter-spacing="4" fill="#94A3B8">
    <tspan fill="#10B981">C</tspan>OMPLEX <tspan fill="#F43F5E">T</tspan>ASK E<tspan fill="#3B82F6">X</tspan>ECUTION
  </text>
</svg>
